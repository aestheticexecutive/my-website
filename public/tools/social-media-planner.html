<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Social Media Planner — Aesthetic Executive</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Tenor+Sans&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0004;--bg-card:#140008;--bg-elevated:#1a000c;
  --burgundy:#2f0410;--burgundy2:#3d051a;
  --gold:#a28c75;--gold-light:rgba(162,140,117,0.6);--gold-muted:rgba(162,140,117,0.14);
  --cream:#fffdf6;--muted:rgba(255,253,246,0.52);--dimmed:rgba(255,253,246,0.32);
  --border:rgba(162,140,117,0.15);--border-bright:rgba(162,140,117,0.3);
  --radius:12px;--radius-sm:8px;--radius-lg:18px;
  --font-display:'Tenor Sans',serif;--font-body:'Be Vietnam Pro',sans-serif;
}
body{background:var(--bg);color:var(--cream);font-family:var(--font-body);font-size:14px;min-height:100vh}

/* ── Header ── */
.header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:14px 24px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,#2f0410 0%,#1a000c 100%);
  position:sticky;top:0;z-index:50;
}
.header-left{display:flex;align-items:center;gap:12px}
.header-logo{display:flex;align-items:center;gap-8px}
.header-brand{font-family:var(--font-display);font-size:14px;letter-spacing:.12em;color:var(--gold);opacity:.9}
.header-sep{width:1px;height:20px;background:var(--border)}
.header-title{font-family:var(--font-display);font-size:15px;color:var(--cream)}
.header-right{display:flex;align-items:center;gap:10px}

.btn{
  display:inline-flex;align-items:center;gap:6px;border:none;cursor:pointer;
  font-family:var(--font-body);font-size:12px;font-weight:500;
  letter-spacing:.08em;padding:8px 16px;border-radius:var(--radius-sm);
  transition:opacity .2s,background .2s;
}
.btn:hover{opacity:.85}
.btn-primary{background:var(--gold);color:var(--bg)}
.btn-ghost{background:var(--gold-muted);color:var(--gold);border:1px solid var(--border-bright)}
.btn-sm{padding:6px 12px;font-size:11px}
.btn-icon{padding:7px;border-radius:var(--radius-sm);background:var(--gold-muted);border:1px solid var(--border);color:var(--gold);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:opacity .2s}
.btn-icon:hover{opacity:.75}
.btn-danger{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.22);color:rgba(239,68,68,.85)}

/* ── Toolbar ── */
.toolbar{
  display:flex;align-items:center;gap:12px;padding:12px 24px;
  border-bottom:1px solid var(--border);flex-wrap:wrap;
}
.filter-tabs{display:flex;gap:4px;flex-wrap:wrap}
.filter-tab{
  display:inline-flex;align-items:center;gap-5px;padding:5px 12px;
  border-radius:999px;border:1px solid var(--border);cursor:pointer;
  font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--muted);
  background:transparent;transition:all .2s;white-space:nowrap;
}
.filter-tab.active{background:var(--gold-muted);border-color:var(--border-bright);color:var(--gold)}
.filter-tab:hover:not(.active){border-color:rgba(162,140,117,.25);color:rgba(162,140,117,.8)}
.toolbar-spacer{flex:1}
.sort-select{
  background:var(--bg-card);border:1px solid var(--border);color:var(--muted);
  font-family:var(--font-body);font-size:11px;padding:5px 10px;border-radius:var(--radius-sm);cursor:pointer;
}
.sort-select option{background:var(--bg-card)}
.count-badge{font-size:11px;color:var(--dimmed);letter-spacing:.05em}

/* ── Main grid ── */
.main{padding:24px;min-height:60vh}
.posts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

/* ── Post Card ── */
.post-card{
  border-radius:var(--radius-lg);border:1px solid var(--border);
  background:linear-gradient(145deg,var(--bg-card) 0%,var(--bg) 100%);
  overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;
  display:flex;flex-direction:column;
}
.post-card:hover{border-color:var(--border-bright);transform:translateY(-1px)}
.post-card-image{
  width:100%;aspect-ratio:1;background:var(--bg-elevated);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}
.post-card-image img{width:100%;height:100%;object-fit:cover}
.post-card-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--dimmed);
}
.post-card-placeholder svg{opacity:.3}
.post-card-placeholder-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase}
.post-card-type-badge{
  position:absolute;top:10px;left:10px;
  background:rgba(12,0,4,.7);backdrop-filter:blur(4px);
  border:1px solid var(--border);border-radius:999px;
  padding:3px 8px;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-light);
}
.post-card-status{
  position:absolute;top:10px;right:10px;
  border-radius:999px;padding:3px 8px;font-size:10px;letter-spacing:.08em;font-weight:500;
}
.status-draft{background:rgba(255,253,246,.08);border:1px solid rgba(255,253,246,.15);color:rgba(255,253,246,.5)}
.status-scheduled{background:rgba(162,140,117,.12);border:1px solid rgba(162,140,117,.25);color:var(--gold)}
.status-posted{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.22);color:rgba(34,197,94,.85)}

.post-card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:10px}
.post-card-platforms{display:flex;gap:4px;flex-wrap:wrap}
.platform-pip{
  display:inline-flex;align-items:center;justify-content:center;
  width:22px;height:22px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.04em;
}
.post-card-caption{font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.post-card-caption.empty{color:var(--dimmed);font-style:italic}
.post-card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.post-card-date{font-size:11px;color:var(--dimmed)}
.post-card-actions{display:flex;gap:4px;opacity:0;transition:opacity .2s}
.post-card:hover .post-card-actions{opacity:1}

/* ── Empty State ── */
.empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:80px 24px;text-align:center;
}
.empty-state-icon{
  width:72px;height:72px;border-radius:20px;
  background:var(--gold-muted);border:1px solid var(--border-bright);
  display:flex;align-items:center;justify-content:center;
}
.empty-state-title{font-family:var(--font-display);font-size:20px;color:var(--cream)}
.empty-state-desc{font-size:13px;color:var(--muted);max-width:320px;line-height:1.6}

/* ── Modal backdrop ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(12,0,4,.85);backdrop-filter:blur(4px);
  z-index:100;display:flex;align-items:flex-start;justify-content:center;
  padding:24px;overflow-y:auto;
}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--bg-card);border:1px solid var(--border-bright);border-radius:var(--radius-lg);
  width:100%;max-width:820px;margin:auto;overflow:hidden;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:16px 20px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--burgundy) 0%,var(--bg-elevated) 100%);
}
.modal-title{font-family:var(--font-display);font-size:16px;color:var(--cream)}
.modal-close{
  background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:18px;line-height:1;padding:4px;transition:color .2s;
}
.modal-close:hover{color:var(--cream)}
.modal-body{padding:20px}
.modal-footer{
  display:flex;align-items:center;justify-content:flex-end;gap:10px;
  padding:14px 20px;border-top:1px solid var(--border);
}

/* ── Editor two-column ── */
.editor-grid{display:grid;grid-template-columns:240px 1fr;gap:20px}
@media(max-width:600px){.editor-grid{grid-template-columns:1fr}}

/* ── Image upload area ── */
.image-upload-area{
  width:100%;aspect-ratio:1;border-radius:var(--radius);
  border:2px dashed var(--border);background:var(--bg-elevated);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;transition:border-color .2s;overflow:hidden;position:relative;
}
.image-upload-area:hover{border-color:var(--border-bright)}
.image-upload-area.has-image{border-style:solid}
.image-upload-area img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.image-upload-overlay{
  position:absolute;inset:0;background:rgba(12,0,4,.55);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  opacity:0;transition:opacity .2s;cursor:pointer;
}
.image-upload-area:hover .image-upload-overlay{opacity:1}
.image-upload-hint{font-size:10px;color:var(--gold);letter-spacing:.08em;text-transform:uppercase}
.image-upload-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  color:var(--dimmed);
}
.image-upload-placeholder span{font-size:11px;letter-spacing:.08em;text-transform:uppercase}

/* ── Form elements ── */
.form-section{display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-label{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold-light)}
.form-input,.form-textarea,.form-select{
  background:var(--bg-elevated);border:1px solid var(--border);color:var(--cream);
  font-family:var(--font-body);font-size:13px;padding:9px 12px;border-radius:var(--radius-sm);
  transition:border-color .2s;resize:none;width:100%;
}
.form-input:focus,.form-textarea:focus,.form-select:focus{
  outline:none;border-color:var(--border-bright);
}
.form-textarea{line-height:1.6;min-height:80px}
.form-textarea.tall{min-height:120px}
.form-select option{background:var(--bg-card)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ── Platform checkboxes ── */
.platform-grid{display:flex;flex-wrap:wrap;gap:6px}
.platform-check{
  display:inline-flex;align-items:center;gap-6px;padding:5px 10px;
  border-radius:var(--radius-sm);border:1px solid var(--border);
  cursor:pointer;transition:all .15s;user-select:none;
  font-size:11px;font-weight:500;letter-spacing:.05em;
}
.platform-check:hover{border-color:rgba(255,255,255,.2)}
.platform-check.checked{border-color:var(--check-color,var(--border-bright))}
.platform-check input{display:none}

/* ── Caption with AI button ── */
.caption-wrapper{position:relative}
.ai-btn{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11px;letter-spacing:.08em;padding:5px 10px;border-radius:999px;
  border:1px solid var(--border-bright);background:var(--gold-muted);color:var(--gold);
  cursor:pointer;transition:all .2s;font-family:var(--font-body);
}
.ai-btn:hover{background:rgba(162,140,117,.22)}
.ai-btn-sparkle{font-size:13px}
.caption-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.char-count{font-size:11px;color:var(--dimmed)}

/* ── AI Modal ── */
.ai-modal{max-width:540px}
.tone-grid{display:flex;flex-wrap:wrap;gap:6px}
.tone-pill{
  padding:5px 12px;border-radius:999px;border:1px solid var(--border);
  cursor:pointer;font-size:11px;letter-spacing:.08em;font-weight:500;color:var(--muted);
  background:transparent;transition:all .15s;font-family:var(--font-body);
}
.tone-pill.active{background:var(--gold-muted);border-color:var(--border-bright);color:var(--gold)}
.ai-result{
  border-radius:var(--radius);border:1px solid var(--border);
  background:var(--bg-elevated);padding:14px;display:none;
  flex-direction:column;gap:12px;
}
.ai-result.visible{display:flex}
.ai-result-label{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold-light)}
.ai-result-text{font-size:13px;line-height:1.6;color:var(--cream);white-space:pre-wrap}
.ai-result-hashtags{font-size:12px;color:var(--muted);line-height:1.6;word-break:break-word}
.ai-generating{
  display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:32px;text-align:center;
}
.ai-generating.visible{display:flex}
.spinner{
  width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--gold);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Confirm modal ── */
.confirm-modal{max-width:400px}
.confirm-body{padding:24px;text-align:center}
.confirm-icon{
  width:56px;height:56px;border-radius:16px;margin:0 auto 16px;
  background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);
  display:flex;align-items:center;justify-content:center;
}
.confirm-title{font-family:var(--font-display);font-size:18px;margin-bottom:8px}
.confirm-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* ── Back link ── */
.back-link{
  display:inline-flex;align-items:center;gap-6px;
  font-size:11px;letter-spacing:.15em;text-transform:uppercase;
  color:rgba(162,140,117,.6);text-decoration:none;transition:opacity .2s;
}
.back-link:hover{opacity:.75}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:14px 0}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gold-muted);border-radius:99px}
</style>
</head>
<body>

<!-- ── Header ── -->
<header class="header">
  <div class="header-left">
    <a href="/members/resources/marketing/social-media" class="back-link">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to Social Media Guide
    </a>
    <div class="header-sep"></div>
    <span class="header-title">Social Media Planner</span>
  </div>
  <div class="header-right">
    <span id="save-indicator" class="char-count" style="display:none">Saved ✓</span>
    <button class="btn btn-primary btn-sm" onclick="openEditor(null)">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Post
    </button>
  </div>
</header>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <div class="filter-tabs" id="platform-filters">
    <button class="filter-tab active" data-filter="all" onclick="setFilter('platform','all')">All Posts</button>
    <button class="filter-tab" data-filter="instagram" onclick="setFilter('platform','instagram')">Instagram</button>
    <button class="filter-tab" data-filter="facebook" onclick="setFilter('platform','facebook')">Facebook</button>
    <button class="filter-tab" data-filter="tiktok" onclick="setFilter('platform','tiktok')">TikTok</button>
    <button class="filter-tab" data-filter="pinterest" onclick="setFilter('platform','pinterest')">Pinterest</button>
    <button class="filter-tab" data-filter="linkedin" onclick="setFilter('platform','linkedin')">LinkedIn</button>
    <button class="filter-tab" data-filter="youtube" onclick="setFilter('platform','youtube')">YouTube</button>
  </div>
  <div class="toolbar-spacer"></div>
  <div class="filter-tabs">
    <button class="filter-tab active" data-status="all" onclick="setFilter('status','all')">All</button>
    <button class="filter-tab" data-status="draft" onclick="setFilter('status','draft')">Draft</button>
    <button class="filter-tab" data-status="scheduled" onclick="setFilter('status','scheduled')">Scheduled</button>
    <button class="filter-tab" data-status="posted" onclick="setFilter('status','posted')">Posted</button>
  </div>
  <select class="sort-select" onchange="setSort(this.value)">
    <option value="newest">Newest First</option>
    <option value="oldest">Oldest First</option>
    <option value="date">Schedule Date</option>
  </select>
  <span class="count-badge" id="post-count"></span>
</div>

<!-- ── Main ── -->
<main class="main">
  <div id="posts-container"></div>
</main>

<!-- ══════════════════ POST EDITOR MODAL ══════════════════ -->
<div class="modal-overlay hidden" id="editor-overlay" onclick="handleOverlayClick(event,'editor-overlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title" id="editor-title">New Post</span>
      <button class="modal-close" onclick="closeEditor()">✕</button>
    </div>
    <div class="modal-body">
      <div class="editor-grid">

        <!-- LEFT: Image upload -->
        <div>
          <label class="form-label" style="display:block;margin-bottom:8px">Content</label>
          <div class="image-upload-area" id="image-drop-zone" onclick="document.getElementById('image-file-input').click()">
            <div class="image-upload-placeholder" id="image-placeholder">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
              <span>Click or drag image</span>
            </div>
            <img id="image-preview" src="" style="display:none" alt="preview"/>
            <div class="image-upload-overlay" id="image-overlay">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              <span class="image-upload-hint">Change image</span>
            </div>
          </div>
          <input type="file" id="image-file-input" accept="image/*" style="display:none" onchange="handleImageSelect(event)"/>
          <button class="btn btn-ghost btn-sm" style="width:100%;margin-top:8px;justify-content:center" id="remove-image-btn" onclick="removeImage()" style="display:none">Remove image</button>

          <div class="divider"></div>

          <!-- Content type -->
          <div class="form-group">
            <label class="form-label">Content Type</label>
            <select class="form-select" id="content-type">
              <option value="reel">Reel / Video</option>
              <option value="carousel">Carousel</option>
              <option value="single">Single Image</option>
              <option value="story">Story</option>
            </select>
          </div>

          <!-- Schedule -->
          <div class="form-group" style="margin-top:12px">
            <label class="form-label">Schedule Date</label>
            <input type="date" class="form-input" id="schedule-date"/>
          </div>
          <div class="form-group" style="margin-top:8px">
            <label class="form-label">Time</label>
            <input type="time" class="form-input" id="schedule-time"/>
          </div>

          <!-- Status -->
          <div class="form-group" style="margin-top:12px">
            <label class="form-label">Status</label>
            <select class="form-select" id="post-status">
              <option value="draft">Draft</option>
              <option value="scheduled">Scheduled</option>
              <option value="posted">Posted</option>
            </select>
          </div>
        </div>

        <!-- RIGHT: Details -->
        <div class="form-section">

          <!-- Platforms -->
          <div class="form-group">
            <label class="form-label">Platforms</label>
            <div class="platform-grid" id="platform-checks"></div>
          </div>

          <div class="divider"></div>

          <!-- Caption -->
          <div class="form-group">
            <div class="caption-toolbar">
              <label class="form-label" style="margin:0">Caption</label>
              <button class="ai-btn" onclick="openAI()">
                <span class="ai-btn-sparkle">✦</span> Generate with AI
              </button>
            </div>
            <textarea class="form-textarea tall" id="caption-input" placeholder="Write your caption here..." oninput="updateCharCount()"></textarea>
            <div style="display:flex;justify-content:flex-end">
              <span class="char-count" id="char-count">0 characters</span>
            </div>
          </div>

          <!-- Hashtags -->
          <div class="form-group">
            <label class="form-label">Hashtags</label>
            <textarea class="form-textarea" id="hashtags-input" placeholder="#medspa #aesthetics #skincare..." style="min-height:64px"></textarea>
          </div>

          <!-- Notes -->
          <div class="form-group">
            <label class="form-label">Notes</label>
            <textarea class="form-textarea" id="notes-input" placeholder="Creative direction, approvals needed, source files, etc..."></textarea>
          </div>

        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" id="delete-post-btn" onclick="confirmDelete()" style="display:none">Delete Post</button>
      <div style="flex:1"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeEditor()">Cancel</button>
      <button class="btn btn-primary btn-sm" onclick="savePost()">Save Post</button>
    </div>
  </div>
</div>

<!-- ══════════════════ AI CAPTION MODAL ══════════════════ -->
<div class="modal-overlay hidden" id="ai-overlay" onclick="handleOverlayClick(event,'ai-overlay')">
  <div class="modal ai-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <span class="modal-title">✦ Generate Caption with AI</span>
      <button class="modal-close" onclick="closeAI()">✕</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">

      <div class="form-group">
        <label class="form-label">What is this post about?</label>
        <textarea class="form-textarea tall" id="ai-context" placeholder="e.g. Before and after Morpheus8 treatment for a patient in their early 50s. Skin tightening results after 3 sessions. Patient loved the results and was a great candidate."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Tone</label>
        <div class="tone-grid" id="tone-grid">
          <button class="tone-pill active" data-tone="educational" onclick="setTone(this)">Educational</button>
          <button class="tone-pill" data-tone="inspiring" onclick="setTone(this)">Inspiring</button>
          <button class="tone-pill" data-tone="promotional" onclick="setTone(this)">Promotional</button>
          <button class="tone-pill" data-tone="entertaining" onclick="setTone(this)">Entertaining</button>
          <button class="tone-pill" data-tone="engaging" onclick="setTone(this)">Engaging</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Optimize For</label>
        <select class="form-select" id="ai-platform">
          <option value="instagram">Instagram</option>
          <option value="facebook">Facebook</option>
          <option value="tiktok">TikTok</option>
          <option value="pinterest">Pinterest</option>
          <option value="linkedin">LinkedIn</option>
          <option value="youtube">YouTube</option>
        </select>
      </div>

      <div class="ai-generating" id="ai-generating">
        <div class="spinner"></div>
        <p style="font-size:13px;color:var(--muted)">Generating caption...</p>
      </div>

      <div class="ai-result" id="ai-result">
        <div>
          <div class="ai-result-label" style="margin-bottom:6px">Caption</div>
          <div class="ai-result-text" id="ai-result-caption"></div>
        </div>
        <div class="divider" style="margin:4px 0"></div>
        <div>
          <div class="ai-result-label" style="margin-bottom:6px">Hashtags</div>
          <div class="ai-result-hashtags" id="ai-result-hashtags"></div>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeAI()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="ai-generate-btn" onclick="runGenerate()">Generate</button>
      <button class="btn btn-primary btn-sm" id="ai-apply-btn" onclick="applyGenerated()" style="display:none">Use This Caption</button>
    </div>
  </div>
</div>

<!-- ══════════════════ CONFIRM DELETE ══════════════════ -->
<div class="modal-overlay hidden" id="confirm-overlay" onclick="handleOverlayClick(event,'confirm-overlay')">
  <div class="modal confirm-modal" onclick="event.stopPropagation()">
    <div class="confirm-body">
      <div class="confirm-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="rgba(239,68,68,.8)" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
      <div class="confirm-title">Delete this post?</div>
      <p class="confirm-desc">This will permanently remove the post from your planner. This cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost btn-sm" onclick="closeConfirm()">Cancel</button>
      <button class="btn btn-danger btn-sm" onclick="deletePost()">Delete Post</button>
    </div>
  </div>
</div>

<script>
// ── Platform config ─────────────────────────────────────────────────────────
const PLATFORMS = {
  instagram: { label:'Instagram', color:'#E1306C', bg:'rgba(225,48,108,0.2)', short:'IG' },
  facebook:  { label:'Facebook',  color:'#1877F2', bg:'rgba(24,119,242,0.2)',  short:'FB' },
  tiktok:    { label:'TikTok',    color:'#FE2C55', bg:'rgba(254,44,85,0.2)',   short:'TT' },
  pinterest: { label:'Pinterest', color:'#E60023', bg:'rgba(230,0,35,0.2)',    short:'PI' },
  linkedin:  { label:'LinkedIn',  color:'#0A66C2', bg:'rgba(10,102,194,0.2)',  short:'IN' },
  youtube:   { label:'YouTube',   color:'#FF0000', bg:'rgba(255,0,0,0.2)',     short:'YT' },
};

const CONTENT_TYPE_LABELS = {
  reel:'Reel',carousel:'Carousel',single:'Single Image',story:'Story'
};

// ── State ────────────────────────────────────────────────────────────────────
let state = {
  posts: [],
  filterPlatform: 'all',
  filterStatus: 'all',
  sort: 'newest',
};

let edit = {
  id: null,
  image: '',
  platforms: ['instagram'],
  contentType: 'reel',
  caption: '',
  hashtags: '',
  notes: '',
  scheduledDate: '',
  scheduledTime: '',
  status: 'draft',
};

let ai = {
  tone: 'educational',
  generatedCaption: '',
  generatedHashtags: '',
};

let pendingDeleteId = null;

// ── Persistence ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'ae_social_planner_v1';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      if (saved.posts) state.posts = saved.posts;
    }
  } catch(e) {}
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ posts: state.posts }));
    const ind = document.getElementById('save-indicator');
    ind.style.display = 'inline';
    setTimeout(() => { ind.style.display = 'none'; }, 1800);
  } catch(e) {}
}

// ── Image compression ────────────────────────────────────────────────────────
function compressImage(file, maxDim, quality, cb) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxDim || h > maxDim) {
        if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
        else { w = Math.round(w * maxDim / h); h = maxDim; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      cb(canvas.toDataURL('image/jpeg', quality));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ── Rendering ────────────────────────────────────────────────────────────────
function renderPosts() {
  let posts = [...state.posts];

  // Filter
  if (state.filterPlatform !== 'all') {
    posts = posts.filter(p => p.platforms.includes(state.filterPlatform));
  }
  if (state.filterStatus !== 'all') {
    posts = posts.filter(p => p.status === state.filterStatus);
  }

  // Sort
  if (state.sort === 'newest') posts.sort((a,b) => b.createdAt - a.createdAt);
  else if (state.sort === 'oldest') posts.sort((a,b) => a.createdAt - b.createdAt);
  else if (state.sort === 'date') {
    posts.sort((a,b) => {
      const da = a.scheduledDate || '9999';
      const db = b.scheduledDate || '9999';
      return da.localeCompare(db);
    });
  }

  const count = document.getElementById('post-count');
  count.textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

  const container = document.getElementById('posts-container');

  if (posts.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#a28c75" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        </div>
        <div class="empty-state-title">No posts yet</div>
        <p class="empty-state-desc">Create your first post to start planning your social media content calendar.</p>
        <button class="btn btn-primary" onclick="openEditor(null)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Create First Post
        </button>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="posts-grid">${posts.map(renderCard).join('')}</div>`;
}

function renderCard(post) {
  const statusClass = `status-${post.status}`;
  const statusLabel = { draft:'Draft', scheduled:'Scheduled', posted:'Posted' }[post.status] || 'Draft';
  const typeLabel = CONTENT_TYPE_LABELS[post.contentType] || '';
  const captionPreview = post.caption ? post.caption.slice(0,120) + (post.caption.length > 120 ? '…' : '') : '';
  const dateStr = post.scheduledDate ? formatDate(post.scheduledDate) : '';

  const platformPips = post.platforms.map(p => {
    const cfg = PLATFORMS[p];
    if (!cfg) return '';
    return `<span class="platform-pip" style="background:${cfg.bg};color:${cfg.color};font-size:9px">${cfg.short}</span>`;
  }).join('');

  const imageContent = post.image
    ? `<img src="${post.image}" alt="post image"/><div class="image-upload-overlay" style="opacity:0"></div>`
    : `<div class="post-card-placeholder">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        <span class="post-card-placeholder-label">${typeLabel}</span>
       </div>`;

  return `
  <div class="post-card" onclick="openEditor('${post.id}')">
    <div class="post-card-image">
      ${imageContent}
      ${typeLabel ? `<span class="post-card-type-badge">${typeLabel}</span>` : ''}
      <span class="post-card-status ${statusClass}">${statusLabel}</span>
    </div>
    <div class="post-card-body">
      <div class="post-card-platforms">${platformPips || '<span style="font-size:11px;color:var(--dimmed)">No platform</span>'}</div>
      <div class="post-card-caption ${captionPreview ? '' : 'empty'}">${captionPreview || 'No caption yet'}</div>
      <div class="post-card-footer">
        <span class="post-card-date">${dateStr || '—'}</span>
        <div class="post-card-actions">
          <button class="btn-icon" onclick="event.stopPropagation();openEditor('${post.id}')" title="Edit">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
          </button>
          <button class="btn-icon" onclick="event.stopPropagation();pendingDeleteId='${post.id}';openConfirm()" title="Delete" style="background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:rgba(239,68,68,.75)">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    const [y,m,d] = dateStr.split('-');
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${months[parseInt(m)-1]} ${parseInt(d)}, ${y}`;
  } catch(e) { return dateStr; }
}

// ── Platform checkboxes ──────────────────────────────────────────────────────
function renderPlatformChecks() {
  const container = document.getElementById('platform-checks');
  container.innerHTML = Object.entries(PLATFORMS).map(([key, cfg]) => {
    const checked = edit.platforms.includes(key);
    return `
      <label class="platform-check ${checked ? 'checked' : ''}" style="--check-color:${cfg.color};${checked ? `background:${cfg.bg};border-color:${cfg.color};color:${cfg.color}` : ''}" data-platform="${key}">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="togglePlatform('${key}',this.checked)"/>
        ${cfg.label}
      </label>`;
  }).join('');
}

function togglePlatform(key, checked) {
  if (checked) {
    if (!edit.platforms.includes(key)) edit.platforms.push(key);
  } else {
    edit.platforms = edit.platforms.filter(p => p !== key);
  }
  renderPlatformChecks();
}

// ── Filters & sort ───────────────────────────────────────────────────────────
function setFilter(type, value) {
  if (type === 'platform') {
    state.filterPlatform = value;
    document.querySelectorAll('[data-filter]').forEach(b => b.classList.toggle('active', b.dataset.filter === value));
  } else {
    state.filterStatus = value;
    document.querySelectorAll('[data-status]').forEach(b => b.classList.toggle('active', b.dataset.status === value));
  }
  renderPosts();
}

function setSort(value) { state.sort = value; renderPosts(); }

// ── Editor open/close ────────────────────────────────────────────────────────
function openEditor(id) {
  if (id) {
    const post = state.posts.find(p => p.id === id);
    if (!post) return;
    edit = { ...post };
    document.getElementById('editor-title').textContent = 'Edit Post';
    document.getElementById('delete-post-btn').style.display = 'inline-flex';
  } else {
    edit = {
      id: null,
      image: '',
      platforms: ['instagram'],
      contentType: 'reel',
      caption: '',
      hashtags: '',
      notes: '',
      scheduledDate: '',
      scheduledTime: '',
      status: 'draft',
    };
    document.getElementById('editor-title').textContent = 'New Post';
    document.getElementById('delete-post-btn').style.display = 'none';
  }

  // Populate fields
  populateEditorFields();
  document.getElementById('editor-overlay').classList.remove('hidden');
}

function populateEditorFields() {
  // Image
  const preview = document.getElementById('image-preview');
  const placeholder = document.getElementById('image-placeholder');
  const overlay = document.getElementById('image-overlay');
  const removeBtn = document.getElementById('remove-image-btn');
  const dropZone = document.getElementById('image-drop-zone');

  if (edit.image) {
    preview.src = edit.image;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    overlay.style.display = 'flex';
    removeBtn.style.display = 'flex';
    dropZone.classList.add('has-image');
  } else {
    preview.style.display = 'none';
    preview.src = '';
    placeholder.style.display = 'flex';
    overlay.style.display = 'none';
    removeBtn.style.display = 'none';
    dropZone.classList.remove('has-image');
  }

  document.getElementById('content-type').value = edit.contentType;
  document.getElementById('schedule-date').value = edit.scheduledDate;
  document.getElementById('schedule-time').value = edit.scheduledTime;
  document.getElementById('post-status').value = edit.status;
  document.getElementById('caption-input').value = edit.caption;
  document.getElementById('hashtags-input').value = edit.hashtags;
  document.getElementById('notes-input').value = edit.notes;

  renderPlatformChecks();
  updateCharCount();
}

function closeEditor() {
  document.getElementById('editor-overlay').classList.add('hidden');
}

// ── Save post ────────────────────────────────────────────────────────────────
function savePost() {
  // Collect from form
  edit.contentType = document.getElementById('content-type').value;
  edit.scheduledDate = document.getElementById('schedule-date').value;
  edit.scheduledTime = document.getElementById('schedule-time').value;
  edit.status = document.getElementById('post-status').value;
  edit.caption = document.getElementById('caption-input').value.trim();
  edit.hashtags = document.getElementById('hashtags-input').value.trim();
  edit.notes = document.getElementById('notes-input').value.trim();

  if (edit.id) {
    // Update
    const idx = state.posts.findIndex(p => p.id === edit.id);
    if (idx !== -1) state.posts[idx] = { ...edit };
  } else {
    // Create
    const newPost = {
      ...edit,
      id: 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      createdAt: Date.now(),
    };
    state.posts.unshift(newPost);
  }

  saveState();
  closeEditor();
  renderPosts();
}

// ── Image handling ───────────────────────────────────────────────────────────
function handleImageSelect(event) {
  const file = event.target.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  compressImage(file, 1200, 0.88, base64 => {
    edit.image = base64;
    populateEditorFields();
  });
  event.target.value = '';
}

function removeImage() {
  edit.image = '';
  populateEditorFields();
}

// Drag and drop
document.addEventListener('DOMContentLoaded', () => {
  const dz = document.getElementById('image-drop-zone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.style.borderColor = 'var(--gold)'; });
  dz.addEventListener('dragleave', () => { dz.style.borderColor = ''; });
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.style.borderColor = '';
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      compressImage(file, 1200, 0.88, base64 => {
        edit.image = base64;
        populateEditorFields();
      });
    }
  });
});

// ── Char count ───────────────────────────────────────────────────────────────
function updateCharCount() {
  const val = document.getElementById('caption-input').value;
  const el = document.getElementById('char-count');
  el.textContent = `${val.length} characters`;
  el.style.color = val.length > 300 ? 'rgba(234,179,8,.8)' : 'var(--dimmed)';
}

// ── AI modal ─────────────────────────────────────────────────────────────────
function openAI() {
  // Pre-select platform from current post
  if (edit.platforms.length > 0) {
    const sel = document.getElementById('ai-platform');
    const first = edit.platforms[0];
    if (PLATFORMS[first]) sel.value = first;
  }

  // Reset result
  document.getElementById('ai-result').classList.remove('visible');
  document.getElementById('ai-generating').classList.remove('visible');
  document.getElementById('ai-apply-btn').style.display = 'none';
  document.getElementById('ai-generate-btn').style.display = 'inline-flex';
  document.getElementById('ai-context').value = '';

  document.getElementById('ai-overlay').classList.remove('hidden');
}

function closeAI() {
  document.getElementById('ai-overlay').classList.add('hidden');
}

function setTone(btn) {
  document.querySelectorAll('.tone-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ai.tone = btn.dataset.tone;
}

async function runGenerate() {
  const context = document.getElementById('ai-context').value.trim();
  if (!context) {
    document.getElementById('ai-context').focus();
    document.getElementById('ai-context').style.borderColor = 'rgba(239,68,68,.4)';
    setTimeout(() => { document.getElementById('ai-context').style.borderColor = ''; }, 1500);
    return;
  }

  const platform = document.getElementById('ai-platform').value;
  const tone = document.querySelector('.tone-pill.active')?.dataset.tone || 'educational';

  document.getElementById('ai-generating').classList.add('visible');
  document.getElementById('ai-result').classList.remove('visible');
  document.getElementById('ai-generate-btn').style.display = 'none';
  document.getElementById('ai-apply-btn').style.display = 'none';

  try {
    const res = await fetch('/api/generate/social-caption', {
      method: 'POST',
      headers: { 'content-type': 'application/json' },
      body: JSON.stringify({ context, platform, tone, contentType: edit.contentType }),
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error);

    ai.generatedCaption = data.caption || '';
    ai.generatedHashtags = data.hashtags || '';

    document.getElementById('ai-result-caption').textContent = ai.generatedCaption;
    document.getElementById('ai-result-hashtags').textContent = ai.generatedHashtags;

    document.getElementById('ai-generating').classList.remove('visible');
    document.getElementById('ai-result').classList.add('visible');
    document.getElementById('ai-apply-btn').style.display = 'inline-flex';
    document.getElementById('ai-generate-btn').textContent = 'Regenerate';
    document.getElementById('ai-generate-btn').style.display = 'inline-flex';

  } catch(e) {
    document.getElementById('ai-generating').classList.remove('visible');
    document.getElementById('ai-generate-btn').style.display = 'inline-flex';
    alert('Generation failed. Please try again.');
  }
}

function applyGenerated() {
  document.getElementById('caption-input').value = ai.generatedCaption;
  document.getElementById('hashtags-input').value = ai.generatedHashtags;
  edit.caption = ai.generatedCaption;
  edit.hashtags = ai.generatedHashtags;
  updateCharCount();
  closeAI();
}

// ── Delete ───────────────────────────────────────────────────────────────────
function confirmDelete() {
  pendingDeleteId = edit.id;
  openConfirm();
}

function openConfirm() {
  document.getElementById('confirm-overlay').classList.remove('hidden');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.add('hidden');
  pendingDeleteId = null;
}

function deletePost() {
  if (!pendingDeleteId) return;
  state.posts = state.posts.filter(p => p.id !== pendingDeleteId);
  saveState();
  closeConfirm();
  closeEditor();
  renderPosts();
}

// ── Overlay click ────────────────────────────────────────────────────────────
function handleOverlayClick(event, overlayId) {
  if (event.target.id === overlayId) {
    if (overlayId === 'editor-overlay') closeEditor();
    else if (overlayId === 'ai-overlay') closeAI();
    else if (overlayId === 'confirm-overlay') closeConfirm();
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
loadState();
renderPosts();
</script>
</body>
</html>
